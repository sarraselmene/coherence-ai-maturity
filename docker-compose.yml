# Neo4j pour le pipeline Graph-RAG (étape 5).
# Lancer : docker compose up -d
# Console : http://localhost:7474  (bolt sur 7687)
# APOC est activé : nécessaire à LlamaIndex pour la construction du knowledge graph.
services:
  neo4j:
    image: neo4j:5.18-community
    container_name: maturai-neo4j
    ports:
      - "7474:7474"   # interface HTTP (navigateur)
      - "7687:7687"   # protocole bolt (driver Python)
    environment:
      # Identifiants — alignés sur .env (NEO4J_USER / NEO4J_PASSWORD)
      NEO4J_AUTH: "neo4j/change-me-please"
      # APOC : procédures avancées utilisées par LlamaIndex Neo4jPGStore
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      # Mémoire (ajuster selon la machine)
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    volumes:
      - ./neo4j_data:/data
      - ./neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
